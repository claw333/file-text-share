<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#eef3fb" />
    <title>轻递 · 安全登录</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="styles.css?v=backend-1" />
  </head>
  <body class="login-body" data-page="login">
    <main class="login-shell">
      <section class="login-intro" aria-labelledby="login-title">
        <a class="brand brand-on-dark" href="index.html" aria-label="轻递首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 36 36" role="img">
              <path d="M8 11.5h20M8 24.5h20M12 7l-4 4.5 4 4.5M24 20l4 4.5-4 4.5" />
            </svg>
          </span>
          <span>轻递</span>
        </a>

        <div class="login-copy">
          <p class="eyebrow">VAULT DEVICE LINK</p>
          <h1 id="login-title">文本和文件，<br />即刻交接。</h1>
          <p class="login-lead">登录后在你的设备之间共享内容，过期自动清理。</p>
        </div>
      </section>

      <section class="login-panel" aria-labelledby="form-title">
        <div class="login-card">
          <div class="login-card-heading">
            <span class="mobile-brand">轻递</span>
            <p class="eyebrow">欢迎回来</p>
            <h2 id="form-title">登录共享空间</h2>
            <p>使用服务器管理员为你创建的账号。</p>
          </div>

          <form id="login-form" novalidate>
            <label class="field">
              <span class="field-label">用户名</span>
              <span class="input-wrap">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M20 21a8 8 0 0 0-16 0M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z" />
                </svg>
                <input id="username" name="username" type="text" autocomplete="username" placeholder="请输入用户名" required />
              </span>
              <span id="username-error" class="field-error" role="alert" hidden></span>
            </label>

            <label class="field">
              <span class="field-label">密码</span>
              <span class="input-wrap">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="10" width="16" height="11" rx="2" />
                  <path d="M8 10V7a4 4 0 0 1 8 0v3M12 14v3" />
                </svg>
                <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required />
                <button class="icon-button password-toggle" type="button" aria-label="显示密码" aria-pressed="false">
                  <svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z" />
                    <circle cx="12" cy="12" r="2.5" />
                  </svg>
                  <svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m3 3 18 18M10.6 6.1A11 11 0 0 1 12 6c6.5 0 10 6 10 6a18 18 0 0 1-2.1 2.8M6.2 6.2C3.5 8 2 12 2 12s3.5 6 10 6c1 0 2-.2 2.8-.4M9.9 9.9a3 3 0 0 0 4.2 4.2" />
                  </svg>
                </button>
              </span>
              <span id="password-error" class="field-error" role="alert" hidden></span>
            </label>

            <p class="form-error" id="login-error" role="alert" hidden></p>

            <button class="button button-primary button-block" type="submit">
              安全登录
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
            </button>
          </form>
        </div>

      </section>
    </main>

    <script src="app.js?v=backend-1"></script>
  </body>
</html>
