name: ${COMPOSE_PROJECT_NAME:-file-text-share}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: file-text-share:${APP_IMAGE_TAG:-local}
    restart: unless-stopped
    environment:
      APP_ADDR: 0.0.0.0:8080
      APP_DB_PATH: /data/share.db
      APP_UPLOAD_DIR: /data/uploads
      APP_COOKIE_SECURE: "true"
      APP_TRUST_PROXY_HEADERS: "true"
    expose:
      - "8080"
    volumes:
      - app-data:/data
    networks:
      - backend
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 20s

  nginx:
    image: nginx:1.30.2-alpine3.23
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?Set PUBLIC_HOST in .env}
      DOODLE_HOST: ${DOODLE_HOST:?Set DOODLE_HOST in .env}
      NGINX_ENVSUBST_FILTER: ^(PUBLIC_HOST|DOODLE_HOST)$
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/app.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${DOODLE_STATIC_ROOT:-./doodle-static}:/usr/share/nginx/doodle:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    networks:
      - edge
      - backend
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d:rw,noexec,nosuid,size=1m
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=4m
      - /tmp:rw,noexec,nosuid,size=4m
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    stop_grace_period: 20s

  nginx-bootstrap:
    image: nginx:1.30.2-alpine3.23
    profiles: ["bootstrap"]
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?Set PUBLIC_HOST in .env}
      DOODLE_HOST: ${DOODLE_HOST:?Set DOODLE_HOST in .env}
      NGINX_ENVSUBST_FILTER: ^(PUBLIC_HOST|DOODLE_HOST)$
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/bootstrap.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot-webroot:/var/www/certbot:ro
    networks:
      - edge
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d:rw,noexec,nosuid,size=1m
      - /var/cache/nginx:rw,noexec,nosuid,size=16m
      - /var/run:rw,noexec,nosuid,size=4m
      - /tmp:rw,noexec,nosuid,size=4m
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

  certbot:
    image: certbot/certbot:v5.6.0
    profiles: ["tools"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    networks:
      - edge
    security_opt:
      - no-new-privileges:true

volumes:
  app-data:
  letsencrypt:
  certbot-webroot:

networks:
  edge:
  backend:
    internal: true
