<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>轻递 · 管理后台</title>
    <link rel="stylesheet" href="styles.css?v=backend-1" />
  </head>
  <body class="app-body" data-page="admin">
    <header class="app-header">
      <div class="page-width header-inner">
        <a class="brand" href="admin.html" aria-label="轻递管理后台">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 36 36"><path d="M8 11.5h20M8 24.5h20M12 7l-4 4.5 4 4.5M24 20l4 4.5-4 4.5" /></svg>
          </span>
          <span>轻递</span>
        </a>

        <div class="header-actions">
          <div class="connection-status" title="当前连接安全">
            <span></span>
            <span class="status-full">管理员后台</span>
          </div>
          <a class="account-button account-link" href="profile.html">
            <span class="avatar" id="account-avatar">A</span>
            <span class="account-copy"><strong id="account-name">admin</strong><small>管理员</small></span>
          </a>
          <button class="icon-button logout-button" id="logout-button" type="button" aria-label="退出登录" title="退出登录">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l5-5-5-5M15 12H3M15 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4" /></svg>
          </button>
        </div>
      </div>
    </header>

    <main class="page-width app-main">
      <section class="welcome-row">
        <div>
          <p class="eyebrow">ADMIN CONSOLE</p>
          <h1>用户管理</h1>
          <p>创建普通用户、重置密码、查看登录和上传情况。</p>
        </div>
      </section>

      <section class="admin-grid" aria-label="管理员后台">
        <article class="composer-card">
          <div class="card-heading">
            <span class="section-icon text-icon">+</span>
            <div><h2>新增普通用户</h2><p>普通用户不能使用 admin 用户名</p></div>
          </div>
          <form class="admin-form" id="admin-create-user-form">
            <label class="field">
              <span class="field-label">用户名</span>
              <span class="input-wrap">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z" /></svg>
                <input id="admin-new-username" type="text" autocomplete="off" placeholder="例如 alice" required />
              </span>
            </label>
            <label class="field">
              <span class="field-label">初始密码</span>
              <span class="input-wrap">
                <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="10" width="16" height="11" rx="2" /><path d="M8 10V7a4 4 0 0 1 8 0v3M12 14v3" /></svg>
                <input id="admin-new-password" type="password" autocomplete="new-password" placeholder="12-128 位复杂密码" required />
              </span>
            </label>
            <button class="button button-primary button-block" type="submit">创建用户</button>
          </form>
        </article>

        <article class="composer-card admin-overview-card">
          <div class="card-heading">
            <span class="section-icon file-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16" /></svg></span>
            <div><h2>概览</h2><p>统计只显示服务器当前保留的数据</p></div>
          </div>
          <div class="admin-stats" id="admin-stats">
            <span><strong>0</strong><small>用户</small></span>
            <span><strong>0</strong><small>文本</small></span>
            <span><strong>0</strong><small>文件</small></span>
          </div>
        </article>
      </section>

      <section class="content-section" aria-labelledby="admin-users-title">
        <div class="section-heading-row">
          <div>
            <p class="eyebrow">USERS</p>
            <h2 id="admin-users-title">用户列表</h2>
          </div>
          <button class="button button-ghost" id="admin-refresh-users" type="button">刷新</button>
        </div>
        <div class="admin-users" id="admin-users" aria-live="polite">
          <div class="list-loading">正在读取用户列表…</div>
        </div>
      </section>
    </main>

    <footer class="app-footer page-width">
      <p><span></span>所有时间按当前设备时区显示，精确到秒</p>
      <p>轻递 · 管理后台</p>
    </footer>

    <div class="toast-region" aria-live="polite" aria-atomic="true">
      <div class="toast" id="toast" hidden>
        <span class="toast-icon"><svg viewBox="0 0 24 24"><path d="m5 12 4 4L19 6" /></svg></span>
        <span id="toast-message">操作成功</span>
      </div>
    </div>

    <script src="app.js?v=backend-1"></script>
  </body>
</html>
